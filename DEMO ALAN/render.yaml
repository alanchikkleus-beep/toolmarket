services:
  - type: web
    name: toolmarket-monitor
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r backend/requirements-cloud.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
